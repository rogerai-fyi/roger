# octocov — coverage reporting on GitHub (PR comment table + badge), self-contained
# (no SaaS). The hard gate lives in scripts/cover-gate.sh; `acceptable` here is a
# redundant total floor so a PR that drops below it also fails. Ratchet UP over time.
coverage:
  paths:
    - cover.out
  # GREEN bar = 90% (founder policy, ratcheted up from 85 once every package cleared 90);
  # aim is 95%+.
  acceptable: 90%
codeToTestRatio:
  code:
    - "**/*.go"
    - "!**/*_test.go"
  test:
    - "**/*_test.go"
    - "features/**/*.feature"
# PR comment with the coverage table + diff vs the base branch.
comment:
  if: is_pull_request
# On main: persist the report as a GitHub Actions artifact (octocov-report); PRs diff
# against it. The github://...@gh-pages datastore was permanently broken ("sub : invalid
# argument" on every push, masked by continue-on-error) - the artifact store needs no
# branch coupling and no extra publish step.
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
