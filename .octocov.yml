# octocov — coverage reporting on GitHub (PR comment table + badge), self-contained
# (no SaaS). The hard gate lives in scripts/cover-gate.sh; `acceptable` here is a
# redundant total floor so a PR that drops below it also fails. Ratchet UP over time.
coverage:
  paths:
    - cover.out
  # GREEN bar = 85% (founder policy); aim is 95%+. Red until the backfill reaches it.
  acceptable: 85%
codeToTestRatio:
  code:
    - "**/*.go"
    - "!**/*_test.go"
  test:
    - "**/*_test.go"
    - "features/**/*.feature"
# PR comment with the coverage table + diff vs the base branch.
comment:
  if: is_pull_request
# On main: persist the report + badge to the gh-pages branch (badge committed to docs/).
report:
  if: is_default_branch
  datastores:
    - github://rogerai-fyi/roger@gh-pages
diff:
  datastores:
    - github://rogerai-fyi/roger@gh-pages
