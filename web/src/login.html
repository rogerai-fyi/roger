<!DOCTYPE html>
<html lang="en">
<head>
  <!-- include: head.html title="Sign in - RogerAI" desc="Sign in to RogerAI to monetize your GPU. Consuming needs no account." theme=external css=chrome robots=noindex -->

  <!-- Sign in with Apple (web) - PUBLIC client config, NOT a secret (it ships to the browser
       by design, like an OAuth client_id). The FOUNDER fills client-id once the Apple
       "Services ID" exists (Apple Developer -> Identifiers -> Services IDs; e.g. fyi.rogerai.web)
       and registers the redirect-uri below as a Return URL for it. While client-id is empty the
       Apple button stays HIDDEN (apple-signin.js) - never half-wired. The iOS app uses the
       Bundle ID; the web uses this Services ID - the broker's appleAudiences() accepts both. -->
  <meta name="appleid-signin-client-id" content="" />
  <meta name="appleid-signin-redirect-uri" content="https://rogerai.fyi/login.html" />
  <meta name="appleid-signin-scope" content="name email" />
</head>
<body class="auth">
  <!-- include: nav.html variant=lean home=/ scrolled=1 -->

  <main class="card">
