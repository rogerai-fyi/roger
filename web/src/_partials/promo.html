<!-- Dismissible $1-starter promo strip. A thin top band on every page (rendered
     above the sticky nav). Monochrome + the one red dot; mono numerals; the
     radio aesthetic. promo.js dismisses it (x) and persists the choice in
     localStorage so it stays gone on return. It starts hidden (.promo[hidden])
     and promo.js reveals it only when not yet dismissed, so a dismissed visitor
     never sees a flash. CSP-safe: no inline JS.

     The $1 starter credit is live now (the broker seeds $1 to the first 1000
     accounts), so the strip renders unconditionally; promo.js could later gate
     on a broker seed-remaining count to auto-hide once the 1000 are used. -->
<aside class="promo" id="promoBar" role="region" aria-label="Launch offer" hidden>
  <div class="wrap promo__inner">
    <p class="promo__msg">
      <span class="promo__dot" aria-hidden="true"></span>
      <span class="promo__copy">
        <b class="mono">$1</b> free credit to start
        <span class="promo__sep" aria-hidden="true">·</span>
        next <span class="mono">1000</span> new accounts
      </span>
    </p>
    <a class="promo__cta" href="/login.html">Get started</a>
    <button class="promo__close" id="promoClose" type="button" aria-label="Dismiss this offer">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <line x1="4" y1="4" x2="12" y2="12" />
        <line x1="12" y1="4" x2="4" y2="12" />
      </svg>
    </button>
  </div>
</aside>
