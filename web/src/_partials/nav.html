<!-- The ONE shared nav. Brand (left) + a utility cluster (right): theme toggle +
     session account control (session.js swaps "Log in" for the avatar/dropdown
     when signed in). Marketing pages also render the section links + the mobile
     burger; account pages render the lean form (brand + theme + account only).
     args:
       variant   = "marketing" (sections + burger) | "lean" (default)
       home      = brand link target (default "/")
       anchors   = prefix for the #section links (empty on the homepage, "/" elsewhere)
       scrolled  = "1" to ship the solid bar state for non-scrolling pages -->
<!-- thin dismissible $1-starter promo strip, above the sticky bar (site-wide) -->
<!-- include: promo.html -->
<header class="nav{{#if scrolled=1}} is-scrolled{{/if}}" id="nav">
  <div class="wrap nav__inner">
    <!-- include: brand.html href={{home}} -->
{{#if variant=marketing}}
    <!-- mobile: open/close the collapsed menu -->
    <button class="nav__burger" id="navBurger" type="button"
            aria-label="Open menu" aria-expanded="false" aria-controls="navMenu">
      <span class="nav__burger-lines" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
{{/if}}
    <nav class="nav__menu" id="navMenu" aria-label="Primary">
{{#if variant=marketing}}
      <!-- section group: terse single-word DESTINATION labels. Decluttered - the
           same-page anchors (Spec #spec / Operating #how / Monetize #monetize) moved
           OUT of the top bar; they still live in the footer Product group and are
           reachable by scroll on the homepage, so nothing is lost. App -> the
           App Store launch page (the app shipped 2026-07-09). -->
      <div class="nav__sections">
        <a class="nav__link" href="/models.html">Models</a>
        <a class="nav__link" href="/voices.html">Voices</a>
        <a class="nav__link" href="/app.html">App</a>
      </div>

      <span class="nav__divider" aria-hidden="true"></span>
{{/if}}
      <!-- utility cluster: manual, source, account, theme - on EVERY page.
           Decluttered - "API keys" (a signed-in action) moved OUT of the top bar to
           the footer Account group; it stays reachable from Log in / the dashboard. -->
      <div class="nav__utils">
        {{#unless variant=marketing}}<a class="nav__link nav__util" href="/models.html">Models</a>{{/unless}}
        {{#unless variant=marketing}}<a class="nav__link nav__util" href="/voices.html">Voices</a>{{/unless}}
        <a class="nav__link nav__util" href="/manual.html">Manual</a>
{{#if variant=marketing}}
        <a class="nav__link nav__util nav__link--ghost nav__source" href="https://github.com/rogerai-fyi/roger" aria-label="View the source on GitHub">
          <svg class="nav__source__mark" viewBox="0 0 16 16" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path></svg>
          Source
        </a>
{{/if}}
        <a class="nav__link nav__util" href="/login.html" data-session-login>Log in</a>
{{#if variant=marketing}}
        <!-- RESERVED: App Store badge SLOT (cut, not live). Position is locked here -
             after Log in, before the theme toggle - so the utility cluster won't
             reflow when the CTA goes live. We do NOT fabricate an App Store link or
             badge yet: no listing exists. When the RogerAI iOS app ships, add the
             real "Download on the App Store" badge anchor here (classes
             nav__link nav__util nav__appstore, pointing at the App Store listing). -->
{{/if}}
        <button class="theme-toggle" id="themeToggle" type="button"
                aria-label="Switch to dark theme" aria-pressed="false">
          <!-- moon: shown in light mode (click switches to dark) -->
          <svg class="theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20.5 14.2A8.2 8.2 0 0 1 9.8 3.5a8.2 8.2 0 1 0 10.7 10.7z" />
          </svg>
          <!-- sun: shown in dark mode (click switches to light) -->
          <svg class="theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2" />
            <g class="theme-toggle__rays">
              <line x1="12" y1="2.5" x2="12" y2="5" />
              <line x1="12" y1="19" x2="12" y2="21.5" />
              <line x1="2.5" y1="12" x2="5" y2="12" />
              <line x1="19" y1="12" x2="21.5" y2="12" />
              <line x1="5.3" y1="5.3" x2="7" y2="7" />
              <line x1="17" y1="17" x2="18.7" y2="18.7" />
              <line x1="5.3" y1="18.7" x2="7" y2="17" />
              <line x1="17" y1="7" x2="18.7" y2="5.3" />
            </g>
          </svg>
        </button>
      </div>
    </nav>
  </div>
</header>
