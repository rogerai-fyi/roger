<!-- Shared <head>. One source for meta, the no-flash theme, fonts and stylesheets.
     args:
       title    = full <title> text
       desc     = meta description (optional)
       theme    = "inline" (homepage only - CSP sha256-locked bytes) | "external"
       robots   = "noindex" to add the robots meta (optional)
       og       = "1" to emit the marketing Open Graph block (optional)
       og       = "post" to emit a per-page Open Graph block instead; pass
                  ogtitle= ogdesc= ogurl= ogimage= (absolute URL, real PNG)
     Stylesheets are wired PER PAGE: build.mjs expands the css-bundle marker
     below into one <link> per CSS module for this page, from the
     CSS_BUNDLES manifest in build.mjs (keyed by page filename). Every page gets
     tokens.css + base.css first (tokens + shared chrome); account pages also get
     account-base.css; then each page's own modules. The old monolithic site.css
     and auth.css were split into per-page modules so editing one page's styles
     never touches a file another page needs. -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Mark JS as available BEFORE first paint. The reveal primitive only hides
       content under `html.js [data-reveal]` (see site.css), so with JS off this
       class never lands and the hero headline + install command render fully.
       The <noscript> below is the belt-and-braces fallback for the same case. -->
  <script>document.documentElement.classList.add("js");</script>
  <!-- BULLETPROOF FAILSAFE: reveal everything even if site.js never runs, so a
       JS error in ANY script can never blank the page again. Independent of
       site.js - reveals all [data-reveal] on DOMContentLoaded plus a setTimeout
       backstop. When site.js works it still adds is-revealed first (with the
       staggered animation); this only guarantees content is never stuck
       invisible. Its sha256 is allow-listed in _headers (script-src) for CSP. -->
  <script>(function(){function r(){var n=document.querySelectorAll("[data-reveal]");for(var i=0;i<n.length;i++){n[i].classList.add("is-revealed");}}if(document.readyState!=="loading"){r();}else{document.addEventListener("DOMContentLoaded",r);}setTimeout(r,1200);})();</script>
  <noscript><style>[data-reveal]{opacity:1 !important;transform:none !important;}</style></noscript>
  <title>{{title}}</title>
{{#if desc}}
  <meta name="description" content="{{desc}}" />
{{/if}}
  <meta name="color-scheme" content="light dark" />
{{#if robots=noindex}}
  <meta name="robots" content="noindex" />
{{/if}}
{{#if theme=inline}}

  <!-- No-flash theme: set data-theme BEFORE first paint. Saved choice wins,
       else the OS preference. Kept tiny and synchronous on purpose.
       Its sha256 is allow-listed in _headers (script-src) for the CSP. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("roger-theme");
        var dark = saved ? saved === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
{{/if}}
{{#if theme=external}}
  <!-- No-flash theme: external (script-src 'self'), runs synchronously before
       first paint, applies the saved roger-theme so the page matches the site. -->
  <script src="js/theme-init.js"></script>
{{/if}}
{{#if og=1}}

  <link rel="canonical" href="https://rogerai.fyi/" />
  <meta property="og:title" content="RogerAI - a two-way radio for GPUs" />
  <meta property="og:description" content="Put your home GPU on air. Tune to the band. Pay per token on the CLI." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://rogerai.fyi/" />
  <meta property="og:site_name" content="RogerAI" />
  <!-- Scrapers do not rasterize SVG; point the social card at a real 1200x630 PNG. -->
  <meta property="og:image" content="https://rogerai.fyi/og.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="RogerAI - a two-way radio for GPUs" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RogerAI - a two-way radio for GPUs" />
  <meta name="twitter:description" content="Put your home GPU on air. Tune to the band. Pay per token on the CLI." />
  <meta name="twitter:image" content="https://rogerai.fyi/og.png" />
{{/if}}
{{#if og=post}}

  <link rel="canonical" href="{{ogurl}}" />
  <meta property="og:title" content="{{ogtitle}}" />
  <meta property="og:description" content="{{ogdesc}}" />
  <meta property="og:type" content="{{ogtype}}" />
  <meta property="og:url" content="{{ogurl}}" />
  <meta property="og:site_name" content="RogerAI" />
  <!-- Scrapers do not rasterize SVG; ogimage must be an absolute real-PNG URL. -->
  <meta property="og:image" content="{{ogimage}}" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1280" />
  <meta property="og:image:height" content="720" />
  <meta property="og:image:alt" content="{{ogtitle}}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ogtitle}}" />
  <meta name="twitter:description" content="{{ogdesc}}" />
  <meta name="twitter:image" content="{{ogimage}}" />
{{/if}}

  <!-- Structured data (JSON-LD): Organization + WebSite site-wide for rich results AND AI-engine
       citations. It is inert DATA, not an executable script, so the strict CSP allows it without a
       hash. SoftwareApplication is added only on the marketing homepage (og=1). -->
  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"Organization","@id":"https://rogerai.fyi/#org","name":"RogerAI","url":"https://rogerai.fyi/","logo":"https://rogerai.fyi/og.png","description":"A two-way radio for GPUs: put your local model on the air, or tune in to community GPUs. OpenAI-compatible."},{"@type":"WebSite","@id":"https://rogerai.fyi/#site","name":"RogerAI","url":"https://rogerai.fyi/","publisher":{"@id":"https://rogerai.fyi/#org"}}]}</script>
{{#if og=1}}
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"RogerAI (roger CLI)","applicationCategory":"DeveloperApplication","operatingSystem":"macOS, Linux, Windows","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"description":"Install roger to put your local GPU model on the air or use community models over an OpenAI-compatible endpoint. Free models available.","url":"https://rogerai.fyi/","publisher":{"@id":"https://rogerai.fyi/#org"}}</script>
{{/if}}

  <!-- favicon: the RogerAI broadcast-tower beacon mark stays the default -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="mask-icon" href="favicon.svg" color="#E0231C" />
  <!-- home-screen / apple-touch: the friendlier Ping-face tile -->
  <link rel="apple-touch-icon" href="ping.svg" />
  <meta name="theme-color" content="#E0231C" />

  <!-- Space Grotesk (display + prose) + JetBrains Mono (machine truth: all
       numbers, labels, callsigns, commands); degrades to system stacks offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- footer easter egg: 5 fast clicks on the orange -> Ping walks across the bottom edge.
       build.mjs auto-appends ?v=<content-hash> to every js/css url, so the Cloudflare edge
       (which caches assets ~24h) always serves the current file - no manual cache-bump needed. -->
  <script src="js/easter-egg.js" defer></script>

  <!-- css-bundle -->
