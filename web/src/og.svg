<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- RogerAI social card. On-brand: warm-paper ground, ink wordmark, the
       single red beacon. Source for og.png (rasterized 1200x630). -->
  <defs>
    <style>
      .ink  { fill: #15140F; }
      .mute { fill: #6b6a63; }
      .live { fill: #E0231C; }
      .word { font-family: "Space Grotesk", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
      .tag  { font-family: "JetBrains Mono", "DejaVu Sans Mono", monospace; font-weight: 500; }
      .eye  { font-family: "JetBrains Mono", "DejaVu Sans Mono", monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- paper ground -->
  <rect width="1200" height="630" fill="#FBFBFA"/>

  <!-- top + bottom hairlines (the document spine motif) -->
  <rect x="0" y="0"   width="1200" height="6" class="ink"/>
  <rect x="80" y="120" width="1040" height="1" class="mute" opacity="0.4"/>
  <rect x="80" y="520" width="1040" height="1" class="mute" opacity="0.4"/>

  <!-- running head -->
  <text x="80" y="92" class="tag" font-size="26" letter-spacing="4" fill="#6b6a63">FIG. 1 - RADIO STATION</text>
  <text x="1120" y="92" class="tag" font-size="26" letter-spacing="2" text-anchor="end" fill="#6b6a63">rogerai.fyi</text>

  <!-- the beacon eye  (( o ))  - the on-air pulse. VECTOR (not font text) so the red dot is
       dead-centered and the mark renders identically everywhere, no font dependency. Everything
       is symmetric about x=310, y=258. -->
  <g>
    <!-- red beacon + concentric on-air rings, centered on (310,258) -->
    <circle cx="310" cy="258" r="34" class="live"/>
    <circle cx="310" cy="258" r="58" fill="none" stroke="#E0231C" stroke-width="3" opacity="0.45"/>
    <circle cx="310" cy="258" r="84" fill="none" stroke="#E0231C" stroke-width="2" opacity="0.2"/>
    <!-- the two-way brackets (( )) - stroked arcs, mirror-symmetric about x=310 -->
    <g fill="none" stroke="#15140F" stroke-width="13" stroke-linecap="round">
      <path d="M 210 212 Q 180 258 210 304"/>   <!-- left inner  ( -->
      <path d="M 168 196 Q 132 258 168 320"/>   <!-- left outer  ( -->
      <path d="M 410 212 Q 440 258 410 304"/>   <!-- right inner ) -->
      <path d="M 452 196 Q 488 258 452 320"/>   <!-- right outer ) -->
    </g>
  </g>

  <!-- wordmark -->
  <text x="160" y="448" class="word" font-size="124" fill="#15140F">RogerAI</text>

  <!-- tagline -->
  <text x="166" y="500" class="tag" font-size="32" letter-spacing="1" fill="#6b6a63">a two-way radio for GPUs</text>
</svg>
