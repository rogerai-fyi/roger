name: coverage
# Runs the full suite with coverage, publishes the report + badge so coverage is always
# VISIBLE (even while the 85% gate is red during the TDD backfill), THEN runs the gate last
# so a sub-85% run goes red without hiding the report.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write        # octocov badge/report + Pages publish to gh-pages
  pull-requests: write   # octocov PR comment

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      # Real Postgres for the store money path (postgres.go) so its coverage is HONEST -
      # without this, ~half of internal/store counts as uncovered and can never hit the bar.
      ROGERAI_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/roger_test?sslmode=disable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Provision the `rogerai` schema (prod provisions it out-of-band; NewPostgres only
      # owns the tables inside it, by design / least privilege).
      - name: create schema
        run: psql "$ROGERAI_TEST_DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS rogerai;"

      # 1) Tests + coverage profile. Fails the job only if TESTS fail (not on low coverage).
      - name: test + coverage
        run: go test -covermode=atomic -coverprofile=cover.out ./...

      # 2) Build the report site — ONLY the html + the func summary (not the whole repo).
      - name: build report + badge
        run: |
          mkdir -p _site
          go tool cover -html=cover.out -o _site/coverage.html
          go tool cover -func=cover.out | tee _site/coverage.txt | tail -1
          pct=$(go tool cover -func=cover.out | awk '/^total:/{gsub("%","",$3);print $3}')
          # Self-contained badge (no SaaS): green at/above the 85% bar, amber below.
          if awk -v p="$pct" 'BEGIN{exit !(p+0>=85)}'; then color="#3fb950"; else color="#d29922"; fi
          printf '%s' "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"118\" height=\"20\" role=\"img\" aria-label=\"coverage: ${pct}%\"><linearGradient id=\"s\" x2=\"0\" y2=\"100%\"><stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/><stop offset=\"1\" stop-opacity=\".1\"/></linearGradient><rect rx=\"3\" width=\"118\" height=\"20\" fill=\"#555\"/><rect rx=\"3\" x=\"70\" width=\"48\" height=\"20\" fill=\"${color}\"/><rect rx=\"3\" width=\"118\" height=\"20\" fill=\"url(#s)\"/><g fill=\"#fff\" text-anchor=\"middle\" font-family=\"Verdana,DejaVu Sans,sans-serif\" font-size=\"11\"><text x=\"35\" y=\"14\">coverage</text><text x=\"94\" y=\"14\">${pct}%</text></g></svg>" > _site/badge.svg

      # 3) octocov: PR coverage table + badge to gh-pages (reads .octocov.yml). Never blocks.
      - uses: k1LoW/octocov-action@v1
        continue-on-error: true

      # 4) Publish the report to gh-pages/coverage (main only) — BEFORE the gate, so a red
      #    gate never hides it. keep_files:false replaces coverage/ (cleans the earlier dump).
      #    -> https://rogerai-fyi.github.io/roger/coverage/coverage.html
      - name: publish report to Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          destination_dir: coverage
          keep_files: false

      # 5) THE GATE — last, so it can go RED (sub-85%) without blocking the report/badge.
      - name: coverage gate (85% bar, aim 95%)
        run: scripts/cover-gate.sh
