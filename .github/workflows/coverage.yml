name: coverage
# Runs the full suite with coverage, publishes the report + badge so coverage is always
# VISIBLE, THEN runs the gate last so a sub-90% run goes red without hiding the report.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write        # Pages publish to gh-pages
  pull-requests: write   # octocov PR comment
  actions: write         # octocov report/diff artifact datastore (octocov-report)

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      # Real Postgres for the store money path (postgres.go) so its coverage is HONEST -
      # without this, ~half of internal/store counts as uncovered and can never hit the bar.
      ROGERAI_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/roger_test?sslmode=disable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Provision the `rogerai` schema (prod provisions it out-of-band; NewPostgres only
      # owns the tables inside it, by design / least privilege).
      - name: create schema
        run: psql "$ROGERAI_TEST_DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS rogerai;"

      # 1) Tests + coverage profile. Fails the job only if TESTS fail (not on low coverage).
      - name: test + coverage
        run: go test -covermode=atomic -coverprofile=cover.out ./...

      # 2) Build the report site — ONLY the html + the func summary (not the whole repo).
      - name: build report + badge
        run: |
          mkdir -p _site
          go tool cover -html=cover.out -o _site/coverage.html
          go tool cover -func=cover.out | tee _site/coverage.txt | tail -1
          pct=$(go tool cover -func=cover.out | awk '/^total:/{gsub("%","",$3);print $3}')
          # Branded, self-contained badge (no SaaS): a dark ROGER·AI pill with the
          # signal-meter motif + a colored % segment - green at/above the 90% bar, amber below.
          if awk -v p="$pct" 'BEGIN{exit !(p+0>=90)}'; then color="#3fb950"; else color="#d29922"; fi
          printf '%s' "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"20\" role=\"img\" aria-label=\"ROGER·AI coverage: ${pct}%\"><title>ROGER·AI coverage: ${pct}%</title><clipPath id=\"r\"><rect width=\"200\" height=\"20\" rx=\"3\"/></clipPath><linearGradient id=\"s\" x2=\"0\" y2=\"100%\"><stop offset=\"0\" stop-color=\"#fff\" stop-opacity=\".07\"/><stop offset=\"1\" stop-opacity=\".07\"/></linearGradient><g clip-path=\"url(#r)\"><rect width=\"200\" height=\"20\" fill=\"#0d1117\"/><rect x=\"142\" width=\"58\" height=\"20\" fill=\"${color}\"/><rect width=\"200\" height=\"20\" fill=\"url(#s)\"/></g><g fill=\"#3fb950\"><rect x=\"9\" y=\"13\" width=\"2.5\" height=\"3\"/><rect x=\"13\" y=\"11\" width=\"2.5\" height=\"5\"/><rect x=\"17\" y=\"8\" width=\"2.5\" height=\"8\"/><rect x=\"21\" y=\"5\" width=\"2.5\" height=\"11\"/></g><g font-family=\"Verdana,DejaVu Sans,sans-serif\" font-size=\"11\"><text x=\"30\" y=\"14\" fill=\"#fff\" font-weight=\"bold\">ROGER·AI</text><text x=\"92\" y=\"14\" fill=\"#8b949e\">coverage</text><text x=\"171\" y=\"14\" fill=\"#fff\" font-weight=\"bold\" text-anchor=\"middle\">${pct}%</text></g></svg>" > _site/badge.svg

          # Per-PACKAGE summary from cover.out (the reassuring greens), so the public page
          # shows "every package vs the bar" instead of only the per-file dropdown - which
          # lists individual files <bar that live inside packages well above it. Aggregates
          # covered/total statements per package directory.
          awk 'NR>1 { split($1,a,":"); f=a[1]; n=split(f,p,"/"); pk=p[1]; for(i=2;i<n;i++) pk=pk"/"p[i]; t[pk]+=$2; if($3+0>0) c[pk]+=$2 } END{ for(k in t) printf "%6.1f%%  %s\n", 100*c[k]/t[k], k }' cover.out | sort -k2 > _site/packages.txt
          { echo "<!doctype html><meta charset=utf-8><title>RogerAI coverage by package</title>"; \
            echo "<style>body{background:#0d1117;color:#c9d1d9;font:14px/1.7 ui-monospace,Menlo,monospace;padding:24px}h1{font-size:16px;color:#fff}a{color:#58a6ff}</style>"; \
            echo "<h1>RogerAI — coverage by package (total ${pct}%, bar 90%)</h1><pre>"; cat _site/packages.txt; \
            echo "</pre><p><a href=coverage.html>per-file detail →</a></p>"; } > _site/packages.html

      # 3) octocov: PR coverage table + badge to gh-pages (reads .octocov.yml). Never blocks.
      - uses: k1LoW/octocov-action@v1
        continue-on-error: true

      # 4) Publish the report to gh-pages/coverage (main only) — BEFORE the gate, so a red
      #    gate never hides it. keep_files:false replaces coverage/ (cleans the earlier dump).
      #    -> https://rogerai-fyi.github.io/roger/coverage/coverage.html
      - name: publish report to Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          destination_dir: coverage
          keep_files: false

      # 5) THE GATE — last, so it can go RED (sub-90%) without blocking the report/badge.
      - name: coverage gate (90% bar, aim 95%)
        run: scripts/cover-gate.sh
