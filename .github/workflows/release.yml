name: release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a release:
# cross-compiles the `roger` CLI for all platforms and uploads them as assets
# named `roger-<os>-<arch>` (+ .exe on Windows) - exactly what web/install.sh fetches.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # A release NEVER ships over a red gate: the same suite + cover-gate as coverage.yml
  # must pass on the tagged commit before any binary is built (v4.15.0 shipped while the
  # gate was red on main - this closes that hole).
  gate:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      ROGERAI_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/roger_test?sslmode=disable
      # Real Valkey for the multi-instance/shared-state suites (liveness churn +
      # cross-instance relay run against the real protocol server, not only miniredis).
      ROGERAI_TEST_REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: create schema
        run: psql "$ROGERAI_TEST_DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS rogerai;"
      - name: test + coverage
        run: go test -covermode=atomic -coverprofile=cover.out ./...
      - name: coverage gate (90% bar, aim 95%)
        run: scripts/cover-gate.sh

  # GoReleaser cross-compiles, publishes the GitHub Release + raw binary assets (the exact
  # names web/install.sh fetches), and pushes the Homebrew cask + Scoop manifest to the tap
  # and bucket repos. The git TAG is still the single source of truth for main.Version - see
  # the ldflags in .goreleaser.yaml. (Tag v4.11.0 -> 4.11.0.)
  release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags for changelog + version
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: release (goreleaser)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # Publishes the GitHub Release + assets into THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo push of the Homebrew cask + Scoop manifest. A PAT (or fine-grained
          # token) with contents:write on rogerai-fyi/homebrew-tap AND rogerai-fyi/scoop-bucket.
          # The default GITHUB_TOKEN can't push to other repos, so this is required for the
          # brew/scoop steps. Missing it fails only those steps, not the published release.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # brew: render Formula/roger.rb from THIS release's checksums.txt and push it to the
  # Homebrew tap. GoReleaser can't do this step - it dropped Homebrew *formula* support in
  # favour of casks (goreleaser.com/deprecations#brews) - and we want a formula, not a cask:
  # it installs on Linux Homebrew too (casks are macOS-only) and needs no `--cask` flag. The
  # SHAs come straight from the release checksums.txt (the same file web/install.sh trusts),
  # so the formula can't drift from the binaries. Skips pre-releases (tags with a `-`), just
  # like the winget job and the old cask's `skip_upload: auto`.
  #   Install: brew trust rogerai-fyi/homebrew-tap && brew install rogerai-fyi/homebrew-tap/roger
  brew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
      - name: render formula from the release checksums + push to the tap
        env:
          # Read this repo's release asset (checksums.txt).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo push to the tap - same token goreleaser uses for Scoop (contents:write
          # on rogerai-fyi/homebrew-tap). Missing it fails only this job, not the release.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"                       # v5.2.1 -> 5.2.1
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
             --pattern checksums.txt --dir .
          scripts/gen-brew-formula.sh "$version" checksums.txt roger.rb
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/rogerai-fyi/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp roger.rb tap/Formula/roger.rb
          cd tap
          git config user.name  "rogerai-release-bot"
          git config user.email "release-bot@rogerai.fyi"
          git add Formula/roger.rb
          if git diff --cached --quiet; then echo "formula unchanged; nothing to push"; exit 0; fi
          git commit -m "roger ${version}: update formula (automated)"
          git push

  # winget: opens a PR to microsoft/winget-pkgs after the release publishes.
  # ONE-TIME prereqs (see packaging/README): the package id RogerAI.Roger must already exist
  # (first manifest submitted manually via wingetcreate) and secrets.WINGET_TOKEN must hold a
  # classic PAT (public_repo) whose account has a fork of microsoft/winget-pkgs.
  # Enable by setting repo variable PUBLISH_WINGET=true. Skips pre-releases (tags with a `-`).
  winget:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_WINGET == 'true' && !contains(github.ref_name, '-') }}
    steps:
      - name: submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: RogerAI.Roger
          # Portable .exe installers (amd64 + arm64) attached to this release.
          installers-regex: 'roger-windows-\w+\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
