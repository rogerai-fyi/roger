name: release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a release:
# cross-compiles the `roger` CLI for all platforms and uploads them as assets
# named `roger-<os>-<arch>` (+ .exe on Windows) - exactly what web/install.sh fetches.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # A release NEVER ships over a red gate: the same suite + cover-gate as coverage.yml
  # must pass on the tagged commit before any binary is built (v4.15.0 shipped while the
  # gate was red on main - this closes that hole).
  gate:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
      ROGERAI_TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/roger_test?sslmode=disable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: roger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: create schema
        run: psql "$ROGERAI_TEST_DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS rogerai;"
      - name: test + coverage
        run: go test -covermode=atomic -coverprofile=cover.out ./...
      - name: coverage gate (90% bar, aim 95%)
        run: scripts/cover-gate.sh

  release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: cross-compile roger
        run: |
          mkdir -p dist
          # The git TAG is the single source of truth for the binary version: stamp it into
          # main.Version so `roger version` + the upgrade check always match the release, even
          # if the source `var Version` fallback was forgotten. (Tag v4.11.0 -> 4.11.0.)
          ver="${GITHUB_REF_NAME#v}"
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${t%/*}; arch=${t#*/}; ext=; [ "$os" = windows ] && ext=.exe
            out="dist/roger-$os-$arch$ext"
            echo "building $out (version $ver)"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w -X main.Version=$ver" -o "$out" ./cmd/rogerai
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
