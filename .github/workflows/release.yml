name: release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a release:
# cross-compiles the `rogerai` CLI for all platforms and uploads them as assets
# named `rogerai-<os>-<arch>` (+ .exe on Windows) - exactly what web/install.sh fetches.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: cross-compile rogerai
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os=${t%/*}; arch=${t#*/}; ext=; [ "$os" = windows ] && ext=.exe
            out="dist/rogerai-$os-$arch$ext"
            echo "building $out"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/rogerai
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
