<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="RogerAI - Ping app icon">
  <!-- iOS app-icon MASTER. Full-bleed square: do NOT round the corners or add transparency -
       iOS applies its own superellipse mask. The Ping glyph (from web/src/ping.svg) is centred
       in the safe area (~22% margins) so the mask never clips it. Warm-ink ground + the live-red
       on-air beacon, matching favicon.svg / ping.svg (monochrome + one red). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1a13"/>
      <stop offset="0.5" stop-color="#15140F"/>
      <stop offset="1" stop-color="#0d0c08"/>
    </linearGradient>
    <radialGradient id="topglow" cx="512" cy="300" r="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeglow" cx="512" cy="373" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0231C" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E0231C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#topglow)"/>
  <rect width="1024" height="1024" fill="url(#eyeglow)"/>

  <!-- Ping, scaled x24 and centred: glyph-space (16,17.8) -> canvas (512,512). -->
  <g transform="translate(128 84.8) scale(24)" fill="#ffffff">
    <path d="M5 6 h6 v3 H8 v6 h3 v3 H5 Z"/>
    <path d="M27 6 h-6 v3 h3 v6 h-3 v3 h6 Z"/>
    <path d="M11 19 h10 v6 a2 2 0 0 1 -2 2 h-6 a2 2 0 0 1 -2 -2 Z"/>
    <rect x="13" y="27" width="2.6" height="2.6" rx=".6"/>
    <rect x="16.4" y="27" width="2.6" height="2.6" rx=".6"/>
    <circle cx="16" cy="12" r="3" fill="#E0231C"/>
  </g>
</svg>
