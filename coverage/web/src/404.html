  <!-- ============================ LOST SIGNAL ============================ -->
  <main id="top">
  <section class="lost">
    <div class="wrap lost__inner">
      <span class="fig" aria-hidden="true">FIG. 404 - NO CARRIER</span>

      <!-- Ping in its dropped / "...static" pose: arms sag, the on-air eye goes
           hollow (a dim ring, no live-red fill). Holds still - the signal is
           gone, so nothing transmits. -->
      <span class="lost__ping" aria-hidden="true">
        <svg class="ping ping--dropped" viewBox="0 0 64 72" fill="currentColor" focusable="false"
             role="img" aria-label="Ping, off the air">
          <g class="ping__body">
            <!-- arms sag down and outward -->
            <path d="M10 10 h9 v4.5 H14.5 v9 H19 V28 H10 Z"/>
            <path d="M54 10 h-9 v4.5 H49.5 v9 H45 V28 h9 Z"/>
            <path d="M22 30 h20 v18 a4 4 0 0 1 -4 4 h-12 a4 4 0 0 1 -4 -4 Z"/>
            <rect x="25" y="64" width="5" height="5" rx="1"/>
            <rect x="34" y="64" width="5" height="5" rx="1"/>
          </g>
          <!-- hollow eye: a dim grey ring, no live-red -->
          <circle class="ping__eye-hollow" cx="32" cy="22" r="6" fill="none" stroke-width="2.5"/>
        </svg>
      </span>

      <h1 class="lost__title">...static. the signal dropped.</h1>
      <p class="lost__sub">
        That channel is not on the band. Either it went off air, or this path
        never broadcast in the first place.
      </p>

      <p class="lost__path mono" aria-label="The page you requested">
        <span class="lost__path-label" aria-hidden="true">no carrier at</span>
        <span class="lost__path-code" id="lostPath">/</span>
      </p>

      <div class="lost__actions">
        <a class="lost__home" href="/">
          <span class="onair" aria-hidden="true">((<span class="onair__dot">•</span>))</span>
          tune back in
        </a>
        <a class="lost__alt" href="/#market">read the band →</a>
      </div>
    </div>
  </section>
  </main>
