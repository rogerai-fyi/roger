# GoReleaser - one config drives the cross-compile + GitHub Release, and pushes
# a Homebrew cask and a Scoop manifest that reference the very same assets.
#
#   local dry-run (no publish):  TAP_GITHUB_TOKEN=dummy goreleaser release --snapshot --clean --skip=publish
#   validate the config:         goreleaser check
#
# CI runs `goreleaser release --clean` on a tag push (see .github/workflows/release.yml),
# AFTER the coverage gate is green. The git TAG is the single source of truth for the
# version - GoReleaser stamps it into main.Version, exactly like the old hand-rolled step.
#
# IMPORTANT: the primary archive is `format: binary`, so the uploaded assets stay RAW binaries
# named `roger-<os>-<arch>` (+ .exe) with a matching checksums.txt - byte-for-byte what
# web/install.sh already fetches. A Windows-only zip is added ALONGSIDE (Scoop needs an
# archive). Switching the raw assets to tarballs would break that installer, so we don't.
version: 2

project_name: roger

# Two builds only so the archives below can single out Windows for a zip (Scoop needs a
# real archive, not a bare binary). Both are byte-identical settings otherwise.
# Match the old release.yml exactly: strip symbols + stamp the tag into main.Version.
# {{.Version}} is the tag WITHOUT the leading v (v5.0.1 -> 5.0.1), same as ${GITHUB_REF_NAME#v}.
builds:
  - id: roger-unix
    main: ./cmd/rogerai
    binary: roger
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{.Version}}"]
  - id: roger-win
    main: ./cmd/rogerai
    binary: roger
    env: [CGO_ENABLED=0]
    goos: [windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{.Version}}"]

# ---- macOS code signing + notarization -----------------------------------------------
# Signs + notarizes the darwin binaries so the OFFICIAL Homebrew cask route
# (`brew install --cask roger` - no tap, no `brew trust`) becomes possible; homebrew-cask
# rejects unsigned binaries (`brew audit --cask --new` -> "Signature verification failed").
# See packaging/homebrew-cask/ for the cask + the remaining gates.
#
# GoReleaser signs Mach-O NATIVELY, so this runs on the Linux release runner (no macOS host,
# no quill/rcodesign). It's OFF until the signing secrets exist: `enabled` self-evaluates from
# MACOS_SIGN_P12, so a release without the secrets skips signing and stays green (the release.yml
# `release` job passes all five through, empty when unset). Wiring them up flips it on with no
# further code change. Owner action - add these repo secrets (Apple Developer Program required):
#   MACOS_SIGN_P12           base64 of the "Developer ID Application" cert exported as .p12
#   MACOS_SIGN_PASSWORD      the .p12 export password
#   MACOS_NOTARY_ISSUER_ID   App Store Connect API issuer id (UUID)
#   MACOS_NOTARY_KEY_ID      App Store Connect API key id
#   MACOS_NOTARY_KEY         base64 of the App Store Connect API key (.p8)
# Signing changes the darwin binaries' bytes, so checksums.txt (and thus the tap formula +
# the cask, both generated from it) track the SIGNED binaries automatically.
notarize:
  macos:
    - enabled: '{{ if .Env.MACOS_SIGN_P12 }}true{{ else }}false{{ end }}'
      ids: [roger-unix]   # the build that emits the darwin binaries (goreleaser signs only those)
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

archives:
  # RAW binaries for every platform - keeps the asset names and the install.sh download
  # path identical to today (roger-linux-amd64, roger-windows-amd64.exe, ...).
  - id: raw
    ids: [roger-unix, roger-win]
    formats: [binary]
    name_template: "roger-{{ .Os }}-{{ .Arch }}"
  # A Windows-only zip, ADDITIONALLY, purely so Scoop has an archive to point at.
  # Produces roger-windows-amd64.zip alongside the .exe (both in the release + checksums).
  - id: winzip
    ids: [roger-win]
    formats: [zip]
    name_template: "roger-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: rogerai-fyi
    name: roger
  # GoReleaser generates the release notes itself from the `changelog` block below
  # (GitHub compare API) - the equivalent of the old action's generate_release_notes.
  # keep-existing: don't clobber a release body if one already exists for the tag.
  mode: keep-existing

changelog:
  use: github
  sort: asc

# ---- Homebrew Formula (macOS + Linux) ------------------------------------------------
# NOT generated here. GoReleaser removed Homebrew *formula* support (`brews`) in favour of
# `homebrew_casks` - it only emits casks now (see goreleaser.com/deprecations#brews). We want
# a FORMULA, not a cask: the formula installs the SAME raw per-arch binary this release ships,
# works on Linux Homebrew too (casks are macOS-only - and RogerAI providers run on Linux GPU
# boxes), and needs no `--cask` flag. So the formula is rendered by scripts/gen-brew-formula.sh
# and pushed to rogerai-fyi/homebrew-tap by the `brew` job in .github/workflows/release.yml,
# straight from this release's checksums.txt. Install:
#   brew trust rogerai-fyi/homebrew-tap && brew install rogerai-fyi/homebrew-tap/roger
#
# Gatekeeper is a non-issue for the formula: Homebrew's formula downloader doesn't set the
# macOS quarantine xattr and the Go linker ad-hoc-signs darwin binaries, so the unsigned CLI
# runs clean (verified: formula install -> `roger version` exits 0, no prompt). The one
# unavoidable step is `brew trust`: Homebrew >= 6 requires it for ANY third-party tap (formula
# OR cask; it's the default via HOMEBREW_REQUIRE_TAP_TRUST). homebrew-core is the only zero-
# trust path and needs an OSI licence; PolyForm Perimeter is source-available, not OSI.

# ---- Scoop (Windows) -----------------------------------------------------------------
# Generates bucket/roger.json and pushes it to rogerai-fyi/scoop-bucket on each release.
#   scoop bucket add rogerai https://github.com/rogerai-fyi/scoop-bucket
#   scoop install roger
scoops:
  - name: roger
    ids: [winzip]
    repository:
      owner: rogerai-fyi
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://rogerai.fyi"
    description: "RogerAI - a two-way radio for GPUs."
    license: "PolyForm-Perimeter-1.0.0"
    skip_upload: auto
