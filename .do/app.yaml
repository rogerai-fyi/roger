# DigitalOcean App Platform spec for the RogerAI broker.
#   doctl apps create --spec .do/app.yaml
# Set the SECRETs (DATABASE_URL = your managed Postgres, ROGERAI_REDIS_URL = the DO
# Valkey rediss:// URI) as encrypted envs in the DO UI - the slots are declared below.
# The broker runs 2 instances (a deliberate cap) with the cross-instance bus ON: see
# instance_count + ROGERAI_MULTI_INSTANCE below and .env.example.
name: rogerai-broker
region: nyc
services:
  - name: broker
    dockerfile_path: Dockerfile
    github:
      repo: rogerai-fyi/roger
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: basic-xxs   # cheapest; broker is I/O-bound
    instance_count: 2               # deliberate cap (scale higher only on explicit go); multi-instance bus ON
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: ROGERAI_REDIS_URL     # DO Valkey rediss:// URI (set the value in the DO UI)
        scope: RUN_TIME            # REQUIRED by ROGERAI_MULTI_INSTANCE: the cross-instance
        type: SECRET               # job/result/stream + ban/registry rendezvous bus
      - key: ROGERAI_MULTI_INSTANCE # turn ON cross-instance handoff across the 2 instances
        scope: RUN_TIME            # (no-ops to single-instance if ROGERAI_REDIS_URL is unset)
        value: "1"
      - key: PORT
        scope: RUN_TIME
        value: "8080"
    routes:
      - path: /
        # serve the broker only on its own domain (broker.rogerai.fyi)
    # The broker answers on broker.rogerai.fyi; the marketing/account site on the
    # apex. Pin each component to its domain so they don't share a route prefix.
# ----------------------------------------------------------------------------
# Marketing + account site (rogerai.fyi). DO runs the build at deploy time:
# `node web/build.mjs` resolves the shared chrome partials (web/src/_partials/
# {head,brand,nav,footer}.html) into every page and copies assets to web/dist/.
# Dependency-free (no npm install); the Node buildpack provides node.
static_sites:
  - name: site
    github:
      repo: rogerai-fyi/roger
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: node web/build.mjs
    output_dir: web/dist
    catchall_document: 404.html   # serve the on-brand 404 for unknown paths
    routes:
      - path: /
domains:
  - domain: broker.rogerai.fyi
    type: PRIMARY
  - domain: rogerai.fyi
    type: ALIAS
  - domain: www.rogerai.fyi
    type: ALIAS
