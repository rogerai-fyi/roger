# DigitalOcean App Platform spec for the RogerAI broker (documentation mirror).
#
# LIVE TRUTH: production is TWO separate DO apps, both in sfo, managed via doctl/UI:
#   - app "rogerai"      (this file) - the broker, Dockerfile build, broker.rogerai.fyi
#   - app "rogerai-web"  - static site (source_dir /web, npm build -> dist), rogerai.fyi + www
# This file mirrors the broker app so changes are reviewable; after editing, apply with:
#   doctl apps spec get <app-id> > live.yaml   # merge, then:
#   doctl apps update <app-id> --spec live.yaml
# SECRET envs are declared as slots only - values live encrypted in DO (EV[...]), never here.
# The broker runs 2 instances (a deliberate cap) with the cross-instance bus ON.
name: rogerai
region: sfo
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
databases:
  - cluster_name: db-halo-main # shared cluster (see internal docs RUNBOOK) - rogeraidb database
    db_name: rogeraidb
    db_user: dorogeraiuser
    engine: PG
    name: db-halo-main
    production: true
domains:
  - domain: broker.rogerai.fyi
    type: PRIMARY
services:
  - name: rogerai
    dockerfile_path: /Dockerfile
    source_dir: /
    github:
      repo: rogerai-fyi/roger
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 2 # deliberate cap (scale higher only on explicit go); multi-instance bus ON
    health_check: # DB-aware readiness: /ready 503s when Postgres is down so the LB
      http_path: /ready # stops routing to a broker that can't touch the wallet
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    alerts:
      - rule: CPU_UTILIZATION
        operator: GREATER_THAN
        value: 85
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        operator: GREATER_THAN
        value: 90
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        operator: GREATER_THAN
        value: 3
        window: FIVE_MINUTES
    envs:
      # --- wiring (values in DO; SECRETs are encrypted slots) ---
      - key: DATABASE_URL # ${db-halo-main.DATABASE_URL}
        scope: RUN_TIME
      - key: ROGERAI_REDIS_URL # DO Valkey rediss:// URI - REQUIRED by ROGERAI_MULTI_INSTANCE
        scope: RUN_TIME
        type: SECRET
      - key: BROKER_PRIVATE_KEY # stable signing identity across deploys/instances
        scope: RUN_TIME
        type: SECRET
      - key: ROGERAI_MULTI_INSTANCE
        scope: RUN_TIME
        value: "1"
      - key: ROGERAI_REQUIRE_BROKER_KEY # refuse to boot with an ephemeral key
        scope: RUN_TIME
        value: "1"
      # --- money ---
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ROGERAI_REQUIRE_LIVE # refuse non-sk_live Stripe keys in prod
        scope: RUN_TIME
        value: "1"
      - key: ROGERAI_SEED_CREDITS
        scope: RUN_TIME
        value: "1"
      - key: ROGERAI_SEED_LIMIT
        scope: RUN_TIME
        value: "1000"
      # --- auth ---
      - key: GITHUB_OAUTH_CLIENT_ID
        scope: RUN_TIME
      - key: GITHUB_OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_OAUTH_REDIRECT # https://broker.rogerai.fyi/auth/github/callback
        scope: RUN_TIME
      - key: APPLE_SERVICES_ID # fyi.rogerai.web
        scope: RUN_TIME
      - key: ADMIN_GITHUB_ID
        scope: RUN_TIME
      # --- moderation (fail-CLOSED in prod) ---
      - key: MODERATION_PROVIDER # groq
        scope: RUN_TIME
      - key: MODERATION_GROQ_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ROGERAI_REQUIRE_MODERATION # 1 = a screen outage rejects rather than serves unscreened
        scope: RUN_TIME
        value: "1"
      - key: GROQ_API_KEY # concierge + moderation fallback
        scope: RUN_TIME
        type: SECRET
      # --- concierge / email / site URLs ---
      - key: CONCIERGE_GRANT_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CONCIERGE_MODEL # gpt-oss-120b
        scope: RUN_TIME
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM # RogerAI <noreply@rogerai.fyi>
        scope: RUN_TIME
      - key: ROGERAI_LOGIN_URL # https://rogerai.fyi/login.html
        scope: RUN_TIME
      - key: ROGERAI_DASHBOARD_URL # https://rogerai.fyi/dashboard.html
        scope: RUN_TIME
      - key: ROGERAI_CONSOLE_URL # https://rogerai.fyi/console.html
        scope: RUN_TIME
      - key: STRIPE_SUCCESS_URL # https://rogerai.fyi/billing.html?topup=ok
        scope: RUN_TIME
      - key: STRIPE_CANCEL_URL # https://rogerai.fyi/billing.html?topup=canceled
        scope: RUN_TIME
