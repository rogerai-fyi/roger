# DigitalOcean App Platform spec for the RogerAI broker.
#   doctl apps create --spec .do/app.yaml
# Set DATABASE_URL (your existing managed Postgres) as an encrypted env in the DO UI.
name: rogerai-broker
region: nyc
services:
  - name: broker
    dockerfile_path: Dockerfile
    github:
      repo: rogerai-fyi/roger
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: basic-xxs   # cheapest; broker is I/O-bound
    instance_count: 1
    health_check:
      http_path: /health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "8080"
    routes:
      - path: /
        # serve the broker only on its own domain (broker.rogerai.fyi)
    # The broker answers on broker.rogerai.fyi; the marketing/account site on the
    # apex. Pin each component to its domain so they don't share a route prefix.
# ----------------------------------------------------------------------------
# Marketing + account site (rogerai.fyi). DO runs the build at deploy time:
# `node web/build.mjs` resolves the shared chrome partials (web/src/_partials/
# {head,brand,nav,footer}.html) into every page and copies assets to web/dist/.
# Dependency-free (no npm install); the Node buildpack provides node.
static_sites:
  - name: site
    github:
      repo: rogerai-fyi/roger
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: node web/build.mjs
    output_dir: web/dist
    catchall_document: 404.html   # serve the on-brand 404 for unknown paths
    routes:
      - path: /
domains:
  - domain: broker.rogerai.fyi
    type: PRIMARY
  - domain: rogerai.fyi
    type: ALIAS
  - domain: www.rogerai.fyi
    type: ALIAS
